<button
  [type]="type"
  [disabled]="disabled || loading"
  class="auth-button w-full inline-flex items-center justify-center gap-2 rounded-lg bg-amarillo px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-azul-claro focus:outline-none focus:ring-2 focus:ring-azul-oscuro focus:ring-offset-2 disabled:opacity-60 disabled:cursor-not-allowed "
>
  @if (loading) {
    <span
      class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
      aria-hidden="true"
    ></span>
  }

  {{ label }}

  @if (iconClass && !loading) {
    <span
      class="text-lg"
      [class]="iconClass"
      aria-hidden="true"
    ></span>
  }
</button>
